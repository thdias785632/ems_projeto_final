<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}EMS — UFABC Grupo 1{% endblock %}</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#f0f4f0;font-family:'DM Sans',sans-serif;color:#1a1a2e;min-height:100vh}
  nav{background:#0f4c35;padding:.75rem 2rem;display:flex;align-items:center;gap:2rem;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.15)}
  nav .brand{font-family:'Sora',sans-serif;font-size:14px;font-weight:700;color:#fff;text-decoration:none;white-space:nowrap}
  nav .brand span{opacity:.6;font-weight:400}
  nav .links{display:flex;gap:.5rem;flex-wrap:wrap}
  nav a.navlink{font-family:'Sora',sans-serif;font-size:12.5px;font-weight:600;color:rgba(255,255,255,.7);text-decoration:none;padding:.4rem .9rem;border-radius:20px;transition:all .2s}
  nav a.navlink:hover{color:#fff;background:rgba(255,255,255,.12)}
  nav a.navlink.active{color:#fff;background:rgba(255,255,255,.2)}
  .page{max-width:900px;margin:0 auto;padding:2rem 1rem}
  {% block extra_css %}{% endblock %}
</style>
</head>
<body>
<nav>
  <a href="/" class="brand">EMS <span>/ Grupo 1</span></a>
  <div class="links">
    <a href="/" class="navlink {% if request.path == '/' %}active{% endif %}">Início</a>
    <a href="/material" class="navlink {% if request.path == '/material' %}active{% endif %}">Material Didático</a>
    <a href="/formulario" class="navlink {% if request.path == '/formulario' %}active{% endif %}">Formulários</a>
    <a href="/dashboard" class="navlink {% if request.path == '/dashboard' %}active{% endif %}">Dashboard</a>
  </div>
</nav>
<div class="page">
  {% block content %}{% endblock %}
</div>
</body>
</html>
